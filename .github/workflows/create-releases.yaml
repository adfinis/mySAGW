---
name: Create Releases

on:
  push:
    branches: [main, cherry_pick_main]
    paths:
      - compose.yaml
      - ember/package.json
      - api/pyproject.toml
      - caluma/version.txt

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calculate-fetch-depth:
    runs-on: ubuntu-latest
    name: Calculate Fetch Depth
    outputs:
      depth: ${{ steps.depth.outputs.depth }}
    steps:
      - name: Calculate Fetch Depth
        id: depth
        env:
          COMMITS: ${{ toJSON(github.event.commits) }}
        run: |
          count=$(echo "$COMMITS" | jq '. | length' || echo "1")
          echo "depth=$((count + 1))" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    name: Create Tags
    needs: calculate-fetch-depth
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: api
            version-file: api/pyproject.toml
            command: python -c 'import sys; import tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
          - name: ember
            version-file: ember/package.json
            command: jq -r '.version'
          - name: caluma
            version-file: caluma/version.txt
            command: cat
          - name: mysagw
            version-file: compose.yaml
            command: yq '.x-version'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ needs.calculate-fetch-depth.outputs.depth }}
          token: ${{ secrets.PAT }}
          persist-credentials: false

      - name: Install python
        if: contains(matrix.config.version-file, 'toml')
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Parse Versions
        id: versions
        run: |
          # Current version
          NEW_VER=$(cat ${{ matrix.config.version-file }} | ${{ matrix.config.command }})
          echo "after=$NEW_VER" >> "$GITHUB_OUTPUT"

          # Previous version - handles first-time files or deleted refs gracefully
          OLD_VER=$(git show ${{ github.event.before }}:${{ matrix.config.version-file }} 2>/dev/null | ${{ matrix.config.command }} || echo "none")
          echo "before=$OLD_VER" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.versions.outputs.after != steps.versions.outputs.before
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ matrix.config.name == 'mysagw' && steps.versions.outputs.after || format('{0}-{1}', matrix.config.name, steps.versions.outputs.after) }}
          name: ${{ matrix.config.name == 'mysagw' && steps.versions.outputs.after || format('{0}-{1}', matrix.config.name, steps.versions.outputs.after) }}
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.PAT }}
