---
name: Tests

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

env:
  ember-dir: ./ember

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set UID
        run: echo "UID=$(id --user)" > .env
      - name: Build and run the containers
        run: docker compose up -d --build api db
      - name: Lint the code
        run: make api-lint
      - name: Check for missing migrations
        run: docker compose exec -T api ./manage.py makemigrations --check --dry-run --no-input
      - name: Run test suite
        run: make api-test
  caluma-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set UID
        run: echo "UID=$(id --user)" > .env
      - name: Build the containers
        run: docker compose up -d --build caluma db
      - name: Run test suite
        run: make caluma-test
  caluma-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install poetry
        run: pipx install poetry
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install dependencies
        run: poetry install --directory=api
      - name: Run test suite
        run: make caluma-lint
  ember-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
      - name: Enable corepack
        run: corepack enable
        working-directory: ${{env.ember-dir}}
      - name: Install dependencies
        run: pnpm install
        working-directory: ${{env.ember-dir}}
      - name: Lint the code
        run: pnpm lint
        working-directory: ${{env.ember-dir}}
      - name: Run tests
        run: pnpm test:ember
        working-directory: ${{env.ember-dir}}
  ember-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set UID
        run: echo "UID=$(id --user)" > .env
      - name: Build and start the container
        run: docker compose up -d --build ember
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install gitlint
        run: pip install gitlint
      - name: Run gitlint
        run: gitlint --contrib contrib-title-conventional-commits --ignore B1,B5,B6
