repos:
  - repo: local
    hooks:
      - id: ruff-format
        stages: [pre-commit]
        name: ruff-format
        language: system
        entry: /bin/sh -c 'cd ./api/ && ruff format .'
        types: [python]
      - id: ruff-check
        stages: [pre-commit]
        name: ruff-check
        language: system
        entry: /bin/sh -c 'cd ./api/ && ruff check . --output-format=full --fix'
        types: [python]
      - id: gitlint
        stages: [commit-msg]
        name: gitlint
        description: Validate commit lint
        entry: gitlint --msg-filename
        language: system
